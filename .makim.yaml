groups:
  clean:
    tasks:
      all:
        help: Clean unnecessary temporary files
        backend: bash
        run: |
          rm -fr build/
          rm -fr dist/
          rm -fr .eggs/
          rm -f .coverage
          rm -fr htmlcov/
          rm -fr .pytest_cache
          rm -fr .mypy_cache
          rm -fr .ruff_cache
          find . -name '*.egg-info' -exec rm -fr {} +
          find . -name '*.egg' -exec rm -f {} +
          find . -name '*.pyc' -exec rm -f {} +
          find . -name '__pycache__' -exec rm -fr {} +
          find . -name '*.pyo' -exec rm -f {} +
          find . -name '*~' -exec rm -f {} +

  docs:
    tasks:
      build:
        help: Build documentation
        run: |
          mkdocs build --config-file mkdocs.yaml

      preview:
        help: Preview documentation page locally
        hooks:
          pre-run:
            - task: docs.build
        run: |
          mkdocs serve --watch docs --config-file mkdocs.yaml

  tests:
    tasks:
      linter:
        help: Run linter tools
        run: |
          pre-commit install
          pre-commit run --all-files --verbose

      unit:
        help: run tests
        args:
          path:
            help: Specify the location of the tests
            type: string
            default: ""
          params:
            help: Specify parameters to be used for tests
            type: string
            default: "-vv"
        backend: bash
        run: |
          pytest \
            --cov=douki \
            --cov-fail-under=90 \
            --cov-report term-missing \
            --no-cov-on-fail ${{ args.path }} ${{ args.params }}

      ci:
        help: run the sames tests executed on CI
        hooks:
          pre-run:
            - task: tests.unit
            - task: tests.smoke
            - task: tests.linter

      smoke:
        help: Run CLI smoke tests
        hooks:
          pre-run:
            - task: smoke-tests.help
            - task: smoke-tests.check-clean
            - task: smoke-tests.check-dirty
            - task: smoke-tests.sync-and-idempotent
            - task: smoke-tests.migrate-numpy
            - task: smoke-tests.class-method-sync

  smoke-tests:
    tasks:
      help:
        help: Test douki --help and subcommand help
        backend: bash
        run: |
          douki --help
          douki sync --help
          douki check --help

      check-clean:
        help: Test douki check on an already-synced file
        backend: bash
        run: |
          TMPDIR=$(mktemp -d)
          cp tests/smoke/clean_file.py "$TMPDIR/clean.py"
          douki check "$TMPDIR/clean.py"
          rm -rf "$TMPDIR"

      check-dirty:
        help: Test douki check on an unsynced file (exit 1)
        backend: bash
        run: |
          TMPDIR=$(mktemp -d)
          cp tests/smoke/dirty_file.py "$TMPDIR/dirty.py"
          # douki check should exit 1 when changes are needed
          douki check "$TMPDIR/dirty.py" && exit 1 || true
          rm -rf "$TMPDIR"

      sync-and-idempotent:
        help: Test douki sync applies changes and is idempotent
        backend: bash
        run: |
          TMPDIR=$(mktemp -d)
          cp tests/smoke/dirty_file.py "$TMPDIR/test.py"
          # First sync should change the file (exit 1)
          douki sync "$TMPDIR/test.py" && exit 1 || true
          # Second sync should be a no-op (exit 0)
          douki sync "$TMPDIR/test.py"
          # Check should now pass (exit 0)
          douki check "$TMPDIR/test.py"
          rm -rf "$TMPDIR"

      migrate-numpy:
        help: Test douki check/sync with --migrate numpy
        backend: bash
        run: |
          TMPDIR=$(mktemp -d)
          cp tests/smoke/numpy_style.py "$TMPDIR/numpy.py"
          # Check with migrate should show diffs (exit 1)
          # Note: douki check doesn't have --migrate anymore. We can only test migrate directly.
          douki migrate --from numpydoc "$TMPDIR/numpy.py" && exit 1 || true
          # Verify the file now contains 'title:'
          grep -q 'title:' "$TMPDIR/numpy.py"
          # Second sync should be idempotent (exit 0)
          douki sync "$TMPDIR/numpy.py"
          rm -rf "$TMPDIR"

      class-method-sync:
        help: Test douki sync handles classes and methods correctly
        backend: bash
        run: |
          TMPDIR=$(mktemp -d)
          cp tests/smoke/dirty_class.py "$TMPDIR/dirty_class.py"
          # Sync should apply changes — attributes: and method params not yet synced
          douki sync "$TMPDIR/dirty_class.py" && exit 1 || true
          # Class attr annotations should appear in attributes:
          grep -q 'attributes:' "$TMPDIR/dirty_class.py"
          grep -q 'result:' "$TMPDIR/dirty_class.py"
          grep -q 'history:' "$TMPDIR/dirty_class.py"
          # __init__ should have parameter synced
          grep -q 'initial:' "$TMPDIR/dirty_class.py"
          # method should have parameters synced
          grep -q 'parameters:' "$TMPDIR/dirty_class.py"
          # Class docstring should NOT have parameters:
          python3 -c "
          import ast
          src = open('$TMPDIR/dirty_class.py').read()
          tree = ast.parse(src)
          for node in ast.walk(tree):
              if isinstance(node, ast.ClassDef):
                  if node.body and isinstance(node.body[0], ast.Expr):
                      ds = node.body[0].value.value
                      assert 'parameters:' not in ds, 'Class docstring should not have parameters:'
          print('OK: no parameters: in class docstring')
          "
          # Second sync should be idempotent (exit 0)
          douki sync "$TMPDIR/dirty_class.py"
          douki check "$TMPDIR/dirty_class.py"
          rm -rf "$TMPDIR"

  package:
    tasks:
      build:
        help: "Build the package"
        run: |
          poetry build

  release:
    vars:
      app: |
        npx --yes \
        -p semantic-release \
        -p "@semantic-release/commit-analyzer" \
        -p "@semantic-release/release-notes-generator" \
        -p "@semantic-release/changelog" \
        -p "@semantic-release/exec" \
        -p "@semantic-release/github" \
        -p "@semantic-release/git" \
        -p "@google/semantic-release-replace-plugin" \
        semantic-release

    tasks:
      ci:
        help: run semantic release on CI
        run: ${{ vars.app }} --ci

      dry:
        help: run semantic release in dry-run mode
        run: ${{ vars.app }} --dry-run
